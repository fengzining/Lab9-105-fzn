<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人信息登记</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: "SimSun", "Microsoft YaHei", sans-serif;
            background: #f8f5f0;
            padding: 20px;
        }
        /* 表单容器样式*/
        .form-container {
            width: 1000px;
            margin: 20px auto;
            padding: 20px;
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        /* 表单标题样式 */
        .form-title {
            text-align: center;
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 20px;
            color: #333;
        }
        /* fieldset 分组样式 */
        fieldset {
            border: 2px solid #e6d5b8;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 20px;
            background: #fff;
        }
        legend {
            font-weight: bold;
            color: #333;
            padding: 0 10px;
            font-size: 16px;
        }
        /* 表格样式 */
        table {
            width: 100%;
            border-collapse: collapse;
            border: 1px solid #999999;
            table-layout: fixed;
        }
        td {
            border: 1px solid #999999;
            padding: 10px;
            vertical-align: middle;
            text-align: left;
            font-size: 14px;
            background: rgba(255, 255, 255, 0.9);
        }
        /* 标签单元格样式 */
        .label {
            background-color: #e6d5b8;
            font-weight: bold;
            color: #333;
            text-align: center;
            width: 120px;
        }
        /* 照片单元格样式 */
        .photo {
            background-color: #e6d5b8;
            text-align: center;
        }
        .photo img {
            width: 98px;
            height: 140px;
            object-fit: cover;
            border: 1px solid #ccc;
            display: block;
            margin: 0 auto;
        }
        /* 表单元素通用样式*/
        input[type="text"],
        input[type="tel"],
        input[type="email"],
        select,
        textarea {
            width: 100%;
            padding: 6px 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 14px;
            font-family: inherit;
            height: 30px;
        }
        textarea {
            resize: vertical;
            min-height: 80px;
            height: fixed;
        }
        /* 单选框样式 */
        input[type="radio"] {
            margin-right: 5px;
            vertical-align: middle;
        }
        /* 按钮样式 */
        .submit-btn {
            text-align: center;
            margin-top: 20px;
        }
        .submit-btn input {
            padding: 10px 30px;
            background: #e6d5b8;
            border: 1px solid #999;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
            font-size: 16px;
        }
        .submit-btn input:hover {
            background: #d4a044;
        }
        .file-input {
        color: transparent;
    }
    .file-input::-webkit-file-upload-button {
        color: #000; /* 保留按钮文字 */
        background: #e6d5b8;
        border: 1px solid #999;
        border-radius: 4px;
        padding: 5px 10px;
        cursor: pointer;
    }
    </style>
</head>
<body>
    <div class="form-container">
        <div class="form-title">个人信息登记表</div>
        <form action="#" method="post" enctype="multipart/form-data">

            <!-- ========= 1. 基本信息分组 ========= -->
            <fieldset>
                <legend>1. 基本信息</legend>
                <table>
                    <tr>
                        <td class="label">姓名</td>
                        <td><input type="text" name="username" value="冯子凝" required></td>
                        <td class="label">性别</td>
                        <td>
                            <input type="radio" name="gender" value="女" checked>女
                            <input type="radio" name="gender" value="男">男
                        </td>
                        <td class="label">年龄</td>
                        <td><input type="text" name="age" value="21" required></td>
                        <td rowspan="3" class="photo">
                            <img src="photo.jpg" alt="个人照片"><br>
                            <input type="file" class="file-input" name="userPhoto" accept="image/*">
                    </tr>
                    <tr>
                        <td class="label">📍籍贯</td>
                        <td>
                            <select name="jiguan" required>
                                <option value="山东省青岛市" selected>山东省青岛市</option>
                                <option value="山东省济南市">山东省济南市</option>
                                <option value="山东省烟台市">山东省烟台市</option>
                                <option value="山东省威海市">山东省威海市</option>
                            </select>
                        </td>
                        <td class="label">📞联系电话</td>
                        <td><input type="tel" name="phone" value="17685860160" required></td>
                        <td class="label">📧电子邮箱</td>
                        <td><input type="email" name="email" value="2119607386@qq.com" required></td>
                    </tr>
                    <tr>
                        <td class="label">🎓学历</td>
                        <td>
                            <select name="education" required>
                                <option value="本科" selected>本科</option>
                                <option value="专科">专科</option>
                                <option value="硕士">硕士</option>
                            </select>
                        </td>
                        <td class="label">❤️健康状况</td>
                        <td><input type="text" name="health" value="良好" required></td>
                        <td class="label">💍婚姻状况</td>
                        <td>
                            <input type="radio" name="maritalStatus" value="未婚" checked>未婚<br>
                            <input type="radio" name="maritalStatus" value="已婚">已婚
                        </td>
                    </tr>
                </table>
            </fieldset>

            <!-- ========= 2. 专业能力分组 ========= -->
            <fieldset>
                <legend>2. 专业能力</legend>
                <table>
                    <tr>
                        <td class="label">💼求职意向</td>
                        <td><input type="text" name="jobIntention" value="前端设计师" required></td>
                        <td class="label">📚专业</td>
                        <td colspan="2">
                            <select name="major" required>
                                <option selected>计算机科学与技术</option>
                                <option>大数据技术</option>
                                <option>人工智能</option>
                                <option>软件技术</option>
                            </select>
                        </td>
                        <td class="label">🏛毕业院校</td>
                        <td><input type="text" name="school" value="烟台理工学院" required></td>
                    </tr>
                    <tr>
                        <td class="label">技能证书</td>
                        <td colspan="6"><input type="text" name="certificate" value="计算机三级" required></td>
                    </tr>
                    <tr>
                        <td class="label">项目经历</td>
                        <td colspan="6"><input type="text" name="project" value="创新创业" required></td>
                    </tr>
                </table>
            </fieldset>

            <!-- ========= 3. 综合说明分组 ========= -->
            <fieldset>
                <legend>3. 综合说明</legend>
                <table>
                   <tr>
                        <td class="label">个人特长与爱好</td>
                        <td colspan="6">
                            <input type="checkbox" name="hobby" value="羽毛球" checked> 羽毛球
                            <input type="checkbox" name="hobby" value="追剧" checked> 追剧
                            <input type="checkbox" name="hobby" value="阅读"> 阅读
                            <input type="checkbox" name="hobby" value="音乐"> 音乐
                            <input type="checkbox" name="hobby" value="旅行"> 旅行
                        </td>
                        </tr>
                    <tr>
                        <td class="label">自我评价</td>
                        <td colspan="6">
                            <textarea name="selfEvaluation" required>本人性格开朗乐观，待人真诚友善，具备较强的学习能力与良好的团队协作精神。在校期间，我系统学习了计算机专业核心课程，熟练掌握HTML、CSS、JavaScript等前端开发技术，能够独立完成网页布局、样式美化与交互效果实现，对响应式设计、前端性能优化也有一定实践经验。我注重代码规范与细节优化，善于在实践中发现问题并解决问题，能快速适配不同浏览器的兼容性要求。同时，我拥有良好的沟通能力和抗压能力，在团队项目中积极承担责任，主动配合后端、设计同学完成各项开发任务，保障项目按节点推进。未来，我希望能在前端开发岗位上继续深耕，不断学习Vue/React等主流框架与工程化工具，提升技术能力与业务理解能力，为团队创造更多价值</textarea>
                        </td>
                    </tr>
                </table>
            </fieldset>

            <div class="submit-btn">
                <input type="submit" value="提交登记信息">
                <input type="reset" value="重置表单" style="margin-left: 20px;">
            </div>
        </form>
    </div>
</body>
</html>
